services:
  # PHP-FPM Application Service
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: new-wb
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
    depends_on:
      - db
    networks:
      - new-wb-network

  # Nginx Web Server Service
  webserver:
    image: nginx:alpine
    container_name: new-wb-webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - new-wb-network

  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: new-wb-db
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: new-wb
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - new-wb-network

  mailhog:
    container_name: new-wb-mailhog
    image: mailhog/mailhog
    restart: always
    logging:
      driver: "none"
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - new-wb-network

    # Background Cron Task Scheduler Engine
  cron:
      container_name: new-wb-cron
      build: ./cron
      init: true
      volumes:
        - .:/var/www
        - vendor_data:/var/www/vendor
      networks:
        - new-wb-network


# Networks
networks:
  new-wb-network:
    driver: bridge

# Volumes
volumes:
  vendor_data:
  db_data: